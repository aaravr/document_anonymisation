# Default profile for KYC / client-onboarding documents.
risk_level: high
replacement_mode: synthetic
consistency_scope: document

# Detection
confidence_threshold: 0.5
enable_regex: true
enable_label_value: true
enable_table: true
enable_spacy: true
enable_presidio: false
spacy_model: en_core_web_sm

# Empty enabled_entities means all canonical entity types are eligible.
enabled_entities: []
disabled_entities: []

# Free-form preserve list - never replace these surface forms even when detected
preserve_entities: []

# Validation thresholds
validation:
  max_originals_remaining: 0
  max_residual_high_confidence: 0
  quality_floor: 0.7

# Label catalogue is supplied by the detection module's defaults; profiles may
# extend it by specifying additional rules under `extra_label_rules`.
extra_label_rules: []
